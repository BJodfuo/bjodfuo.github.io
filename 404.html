<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    
    <link rel="icon" type="image/png" href="/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f111a;
            color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .error-card {
            background-color: #161925;
            border: 1px solid #23283d;
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #7289da;
            line-height: 1;
        }
        .custom-quote {
            border-left: 3px solid #e05252;
            padding-left: 1rem;
            background-color: #24191f;
            border-radius: 0 8px 8px 0;
        }
        .custom-btn {
            background-color: #1f2336;
            border: 1px solid #2d334d;
            color: #f8f9fa;
            transition: all 0.2s ease-in-out;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.2rem;
        }
        .custom-btn:hover {
            background-color: #2d334d;
            border-color: #7289da;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .footer-copyright {
            color: #4e5569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container d-flex flex-column align-items-center justify-content-center" style="max-width: 520px; width: 90%;">
    <div class="error-card mb-3 text-center">
        
        <div class="error-code font-monospace mb-2">404</div>
        <h3 class="fw-bold mb-3">Page Not Found</h3>
        
        <p class="small text-secondary mb-4">The route you are trying to access does not exist or has been moved completely.</p>

        <div class="custom-quote p-3 text-start mb-4">
            <p class="mb-0 text-light small font-monospace">"Looks like we hit a dead end. Let's get you back on track."</p>
        </div>

        <div class="d-grid">
            <a href="/" class="btn custom-btn rounded-3 fw-bold">
                <i class="bi bi-house-door-fill me-2"></i> Back to Safety
            </a>
        </div>
    </div>
    
    <div class="text-center footer-copyright">
        © 2026 BJodfuo. All rights reserved.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
